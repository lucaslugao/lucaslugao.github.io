<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Sphere Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        .fab {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, background-color 0.2s, opacity 0.5s ease, visibility 0.5s;
            z-index: 100;
            border: none;
        }
        .fab:active { transform: scale(0.92); }
        .fab svg { fill: white; width: 26px; height: 26px; pointer-events: none; }

        /* Unified Positioning (20px from corners) */
        #settings-btn { top: 20px; left: 20px; background-color: #444; }
        #toggle-ui-btn { top: 20px; right: 20px; background-color: #333; }
        #bg-btn { bottom: 20px; left: 20px; background-color: #444; }
        #action-btn { bottom: 20px; right: 20px; background-color: #222; }

        /* Kinetic Energy Meter */
        #ke-meter-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 90;
            transition: opacity 0.5s ease, visibility 0.5s;
            pointer-events: none;
        }
        #ke-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }
        #ke-label {
            color: white;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            opacity: 0.6;
        }
        #ke-value {
            color: #88ff88;
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 85px;
            text-align: right;
        }
        #ke-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #ke-bar-fill {
            width: 0%;
            height: 100%;
            background: #88ff88;
            box-shadow: 0 0 10px #88ff88;
        }

        #settings-panel {
            position: absolute;
            top: 85px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            width: 240px;
            backdrop-filter: blur(10px);
        }
        #settings-panel.visible { display: block; }
        
        .setting-row { margin-bottom: 12px; }
        .setting-row label { display: block; font-size: 11px; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .setting-row input[type="range"] { width: 100%; cursor: pointer; }
        
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .toggle-row input { cursor: pointer; width: 16px; height: 16px; }

        #picker-container {
            position: absolute;
            left: 20px;
            bottom: 85px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(10px);
        }
        #picker-container.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }

        #file-input { display: none; }
    </style>
</head>
<body>
    
    <div id="settings-panel">
        <div class="setting-row">
            <label id="sensitivity-label">Impulse Sensitivity: 0.10</label>
            <input type="range" id="sensitivity-range" min="0.0001" max="0.01" step="0.0001" value="0.0010">
        </div>
        <div class="setting-row">
            <label id="friction-label">Friction / Drag: 0.000</label>
            <input type="range" id="friction-range" min="0.000" max="0.1" step="0.001" value="0.000">
        </div>
        <label class="toggle-row">
            <input type="checkbox" id="inertia-toggle" checked>
            <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px;">Inertial Flick Mode</span>
        </label>
    </div>

    <div id="picker-container">
        <div id="iro-picker"></div>
    </div>

    <div id="ke-meter-container" class="ui-element">
        <div id="ke-header">
            <span id="ke-label">Kinetic Energy</span>
            <span id="ke-value">0.00 J</span>
        </div>
        <div id="ke-bar-bg">
            <div id="ke-bar-fill"></div>
        </div>
    </div>

    <button id="toggle-ui-btn" class="fab" title="Toggle UI">
        <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
    </button>

    <button id="settings-btn" class="fab ui-element" title="Physics Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <button id="bg-btn" class="fab ui-element" title="Background Color">
        <svg viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
    </button>

    <button id="action-btn" class="fab ui-element">
        <span id="btn-icon">
            <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        </span>
    </button>
    <input type="file" id="file-input" accept="image/*">

    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, sphereMesh;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        let rotationAxis = new THREE.Vector3(0, 1, 0);
        let rotationVelocity = 0;
        let frictionAmount = 0.0; 
        let sensitivity = 0.001;
        let isInertiaMode = true;

        let currentZoom = 9.0;
        let initialPinchDistance = 0, initialZoom = 0;
        let hasCustomImage = false;

        let uiVisible = true;
        let eyeFadeTimeout = null;
        let keBarFill = null;
        let keValueDisplay = null;

        const uploadIcon = '<svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>';
        const trashIcon = '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';

        window.onload = init;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); 

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, currentZoom); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 10, 7.5);
            scene.add(sun);

            const geometry = new THREE.SphereGeometry(2.5, 64, 32);
            const material = new THREE.MeshStandardMaterial({ 
                map: createCheckerboardTexture(),
                roughness: 0.4, metalness: 0.1
            });
            sphereMesh = new THREE.Mesh(geometry, material);
            scene.add(sphereMesh);

            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x88ff88, transparent: true, opacity: 0.8 })
            );
            sphereMesh.add(core);

            keBarFill = document.getElementById('ke-bar-fill');
            keValueDisplay = document.getElementById('ke-value');

            setupInteraction();
            setupUI();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function setupUI() {
            const actionBtn = document.getElementById('action-btn');
            const iconSpan = document.getElementById('btn-icon');
            const fileInput = document.getElementById('file-input');
            const bgBtn = document.getElementById('bg-btn');
            const settingsBtn = document.getElementById('settings-btn');
            const toggleUiBtn = document.getElementById('toggle-ui-btn');
            const settingsPanel = document.getElementById('settings-panel');
            const pickerContainer = document.getElementById('picker-container');
            const uiElements = document.querySelectorAll('.ui-element');
            const inertiaToggle = document.getElementById('inertia-toggle');
            const textureLoader = new THREE.TextureLoader();

            toggleUiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                uiVisible = !uiVisible;
                uiElements.forEach(el => el.classList.toggle('ui-hidden', !uiVisible));
                if (!uiVisible) {
                    settingsPanel.classList.remove('visible');
                    pickerContainer.classList.remove('visible');
                    resetEyeFade();
                } else {
                    clearTimeout(eyeFadeTimeout);
                    toggleUiBtn.style.opacity = "1";
                    toggleUiBtn.style.visibility = "visible";
                }
            });

            const resetEyeFade = () => {
                if (uiVisible) return;
                toggleUiBtn.style.opacity = "1";
                toggleUiBtn.style.visibility = "visible";
                clearTimeout(eyeFadeTimeout);
                eyeFadeTimeout = setTimeout(() => {
                    if (!uiVisible) {
                        toggleUiBtn.style.opacity = "0";
                        setTimeout(() => { if (!uiVisible) toggleUiBtn.style.visibility = "hidden"; }, 500);
                    }
                }, 5000);
            };

            window.addEventListener('mousemove', resetEyeFade);
            window.addEventListener('touchstart', resetEyeFade);

            inertiaToggle.addEventListener('change', (e) => {
                isInertiaMode = e.target.checked;
                rotationVelocity = 0;
            });

            document.getElementById('sensitivity-range').addEventListener('input', (e) => {
                sensitivity = parseFloat(e.target.value);
                document.getElementById('sensitivity-label').innerText = `Impulse Sensitivity: ${(sensitivity * 100).toFixed(2)}`;
            });
            document.getElementById('friction-range').addEventListener('input', (e) => {
                frictionAmount = parseFloat(e.target.value);
                document.getElementById('friction-label').innerText = `Friction / Drag: ${frictionAmount.toFixed(3)}`;
            });

            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                settingsPanel.classList.toggle('visible');
            });

            const colorPicker = new iro.ColorPicker("#iro-picker", {
                width: 180, color: "#000000", borderWidth: 1, borderColor: "#ccc",
            });

            colorPicker.on('color:change', (color) => {
                scene.background.set(color.hexString);
                document.body.style.backgroundColor = color.hexString;
            });

            bgBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                pickerContainer.classList.toggle('visible');
            });

            window.addEventListener('mousedown', (e) => {
                if (!pickerContainer.contains(e.target) && e.target !== bgBtn) pickerContainer.classList.remove('visible');
                if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) settingsPanel.classList.remove('visible');
            });

            actionBtn.addEventListener('click', () => {
                if (hasCustomImage) {
                    if (sphereMesh.material.map) sphereMesh.material.map.dispose();
                    sphereMesh.material.map = createCheckerboardTexture();
                    sphereMesh.material.needsUpdate = true;
                    hasCustomImage = false;
                    iconSpan.innerHTML = uploadIcon;
                    fileInput.value = '';
                } else { fileInput.click(); }
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        textureLoader.load(ev.target.result, (tex) => {
                            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                            tex.colorSpace = THREE.SRGBColorSpace;
                            if (sphereMesh.material.map) sphereMesh.material.map.dispose();
                            sphereMesh.material.map = tex;
                            sphereMesh.material.needsUpdate = true;
                            hasCustomImage = true;
                            iconSpan.innerHTML = trashIcon;
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function createCheckerboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const cols = 16, rows = 8;
            const w = 1024 / cols, h = 512 / rows;
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#ffffff' : '#999999';
                    ctx.fillRect(i * w, j * h, w, h);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function setupInteraction() {
            const getDist = (t) => Math.hypot(t[0].pageX - t[1].pageX, t[0].pageY - t[1].pageY);

            const onMove = (x, y) => {
                if (!isDragging) return;
                const deltaX = x - previousMousePosition.x;
                const deltaY = y - previousMousePosition.y;
                const moveAxis = new THREE.Vector3(deltaY, deltaX, 0);
                const moveDistance = moveAxis.length();

                if (moveDistance > 0) {
                    const newAxis = moveAxis.clone().normalize();
                    
                    if (isInertiaMode) {
                        // Pure vector addition: adds continuous pushing force to existing momentum
                        const impulse = moveDistance * sensitivity;
                        const currentMomentum = new THREE.Vector3().copy(rotationAxis).multiplyScalar(rotationVelocity);
                        const newImpulse = new THREE.Vector3().copy(newAxis).multiplyScalar(impulse);
                        
                        currentMomentum.add(newImpulse);
                        rotationVelocity = currentMomentum.length();
                        
                        if (rotationVelocity > 0.00001) {
                            rotationAxis.copy(currentMomentum).normalize();
                        }
                    } else {
                        // Simple drag mode: direct rotation
                        const impulse = moveDistance * sensitivity * 8.0;
                        sphereMesh.rotateOnWorldAxis(newAxis, impulse);
                    }
                }
                previousMousePosition = { x, y };
            };

            const onStart = (x, y) => {
                isDragging = true;
                previousMousePosition = { x, y };
            };

            const onEnd = () => {
                isDragging = false;
            };

            window.addEventListener('mousedown', (e) => {
                if (e.target.closest('.fab') || e.target.closest('#picker-container') || e.target.closest('#settings-panel')) return;
                onStart(e.clientX, e.clientY);
            });
            window.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', onEnd);

            window.addEventListener('touchstart', (e) => {
                if (e.target.closest('.fab') || e.target.closest('#picker-container') || e.target.closest('#settings-panel')) return;
                if (e.touches.length === 1) {
                    onStart(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    initialPinchDistance = getDist(e.touches);
                    initialZoom = currentZoom;
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    onMove(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    const ratio = initialPinchDistance / getDist(e.touches);
                    currentZoom = Math.max(4, Math.min(20, initialZoom * ratio));
                    camera.position.z = currentZoom;
                }
            }, { passive: false });

            window.addEventListener('touchend', onEnd);
            window.addEventListener('wheel', (e) => {
                currentZoom = Math.max(4, Math.min(20, currentZoom + e.deltaY * 0.01));
                camera.position.z = currentZoom;
            }, { passive: false });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isInertiaMode) {
                // Ball ALWAYS spins if it has velocity, even when finger is touching it
                if (rotationVelocity > 0.00001) {
                    sphereMesh.rotateOnWorldAxis(rotationAxis, rotationVelocity);
                    
                    if (isDragging) {
                        // High "finger friction" when holding it
                        rotationVelocity *= 0.92;
                    } else {
                        // Standard friction when let go
                        rotationVelocity *= (1.0 - frictionAmount);
                    }
                }
            } else {
                rotationVelocity = 0;
            }

            // Energy update based on current state (either free spinning or calculated from flick)
            const energyJoules = (rotationVelocity * rotationVelocity) * 25000;
            const energyPercent = Math.min(100, energyJoules * 0.2); 

            if (keBarFill) keBarFill.style.width = energyPercent + '%';
            if (keValueDisplay) keValueDisplay.innerText = energyJoules.toFixed(2) + " J";

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
